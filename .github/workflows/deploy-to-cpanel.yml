name: Deploy to behformas.com (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ./public_html/
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.DS_Store
            **/maintenance-check.php
            **/.env
            **/.env.local

      - name: Deploy data directory via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: ./data/
          dangerous-clean-slate: false

      - name: Create openai_config.php on server
        uses: appleboy/ssh-action@master
        if: ${{ false }}  # Disabled - configure manually on server
        continue-on-error: true

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed!"
          echo "📍 Files deployed to: behformas.com/public_html"
          echo "📍 Data directory updated"
          echo ""
          echo "Next steps:"
          echo "1. Verify at: https://behformas.com/maintenance.html"
          echo "2. Configure openai_config.php on server"
          echo "3. Test API endpoints"
