name: Deploy to behformas.com (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate production-safe asset paths
        run: |
          if grep -RIlE 'beh/fotos(%20| )BEH(%20| )/' public_html --include='*.html' --include='*.css' --include='*.js' --include='*.php'; then
            echo "Found references to the legacy folder with spaces. Use beh/fotos-beh/."
            exit 1
          fi
          test -d public_html/beh/fotos-beh
          test -f public_html/beh/fotos-beh/490327811_1228774275921020_3404180664125765180_n.jpg

      - name: Deploy public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ./public_html/
          state-name: .ftp-deploy-sync-state-public_html.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.DS_Store
            **/maintenance-check.php
            **/.env
            **/.env.local
            **/beh/fotos BEH /**
            **/beh/fotos BEH_/**
            **/logs/**
            **/etc/**
            **/claves.txt

      - name: Deploy data directory via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: ./data/
          state-name: .ftp-deploy-sync-state-data.json
          dangerous-clean-slate: false

      - name: Deployment Summary
        run: |
          echo "Deployment completed."
          echo "Site: https://behformas.com/"
          echo "Store: https://tienda.behformas.com/"
