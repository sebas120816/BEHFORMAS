name: Deploy Store (GrandNode FTP)

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/deploy-store.yml'
      - 'marketplace-grandnode/**'
  workflow_dispatch:
    inputs:
      sync_database:
        description: 'Reemplazar tambien beh-marketplace.db de produccion con la copia local (solo si produccion no tiene pedidos/clientes reales que perder)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketplace-grandnode

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Bootstrap critical source files (if missing)
        run: |
          APP_DIR="${GITHUB_WORKSPACE}/marketplace-grandnode"
          if [ ! -d "$APP_DIR" ]; then APP_DIR="$PWD"; fi

          mkdir -p "$APP_DIR/src/Build"
          if [ ! -f "$APP_DIR/src/Build/Grand.Common.props" ]; then
            printf '%s\n' \
              '<Project>' \
              '  <PropertyGroup>' \
              '    <TargetFramework Condition="'"'"'$(TargetFramework)'"'"' == '"'"''"'"'">net9.0</TargetFramework>' \
              '    <Nullable>enable</Nullable>' \
              '    <ImplicitUsings>enable</ImplicitUsings>' \
              '    <LangVersion>latest</LangVersion>' \
              '    <Deterministic>true</Deterministic>' \
              '  </PropertyGroup>' \
              '  <ItemGroup>' \
              '    <Using Include="System.Text" />' \
              '  </ItemGroup>' \
              '</Project>' > "$APP_DIR/src/Build/Grand.Common.props"
          fi

          mkdir -p "$APP_DIR/src/Web/Grand.Web.Vendor/Models/Vendor"
          if [ ! -f "$APP_DIR/src/Web/Grand.Web.Vendor/Models/Vendor/VendorModel.cs" ]; then
            printf '%s\n' \
              'using System.Collections.Generic;' \
              'using Grand.Infrastructure.ModelBinding;' \
              'using Grand.Infrastructure.Models;' \
              'using Grand.Web.Common.Models;' \
              'using Grand.Web.Vendor.Models.Common;' \
              '' \
              'namespace Grand.Web.Vendor.Models.Vendor;' \
              '' \
              'public class VendorModel : BaseEntityModel, ILocalizedModel<VendorLocalizedModel>' \
              '{' \
              '    public VendorModel()' \
              '    {' \
              '        Locales = new List<VendorLocalizedModel>();' \
              '        Address = new AddressModel();' \
              '    }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.Name")]' \
              '    public string Name { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.Email")]' \
              '    public string Email { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.Description")]' \
              '    public string Description { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.MetaKeywords")]' \
              '    public string MetaKeywords { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.MetaDescription")]' \
              '    public string MetaDescription { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.MetaTitle")]' \
              '    public string MetaTitle { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.SeName")]' \
              '    public string SeName { get; set; }' \
              '' \
              '    public AddressModel Address { get; set; }' \
              '    public IList<VendorLocalizedModel> Locales { get; set; }' \
              '}' \
              '' \
              'public class VendorLocalizedModel : ILocalizedModelLocal, ISlugModelLocal' \
              '{' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.Name")]' \
              '    public string Name { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.Description")]' \
              '    public string Description { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.MetaKeywords")]' \
              '    public string MetaKeywords { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.MetaDescription")]' \
              '    public string MetaDescription { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.MetaTitle")]' \
              '    public string MetaTitle { get; set; }' \
              '' \
              '    public string LanguageId { get; set; }' \
              '' \
              '    [GrandResourceDisplayName("Admin.Vendors.Fields.SeName")]' \
              '    public string SeName { get; set; }' \
              '}' > "$APP_DIR/src/Web/Grand.Web.Vendor/Models/Vendor/VendorModel.cs"
          fi

      - name: Preflight checks (critical source files)
        run: |
          APP_DIR="${GITHUB_WORKSPACE}/marketplace-grandnode"
          if [ ! -d "$APP_DIR" ]; then APP_DIR="$PWD"; fi

          echo "Preflight APP_DIR: $APP_DIR"
          ls -la "$APP_DIR/src/Build" || true
          ls -la "$APP_DIR/src/Web/Grand.Web.Vendor/Models/Vendor" || true

          test -f "$APP_DIR/src/Build/Grand.Common.props"
          test -f "$APP_DIR/src/Web/Grand.Web.Vendor/Models/Vendor/VendorModel.cs"

      - name: Restore solution
        run: dotnet restore GrandNode.sln

      - name: Restore Grand.Web for linux-x64 publish
        run: dotnet restore src/Web/Grand.Web/Grand.Web.csproj -r linux-x64

      - name: Build Theme.BehOffice plugin (Release)
        run: dotnet build src/Plugins/Theme.BehOffice/Theme.BehOffice.csproj -c Release --no-restore

      - name: Build Payments.CashOnDelivery plugin (Release)
        run: dotnet build src/Plugins/Payments.CashOnDelivery/Payments.CashOnDelivery.csproj -c Release --no-restore

      - name: Verify commerce readiness
        run: bash deploy/check-commerce-readiness.sh

      - name: Publish Grand.Web (linux-x64, self-contained)
        run: dotnet publish src/Web/Grand.Web/Grand.Web.csproj -c Release -r linux-x64 --self-contained false --no-restore -o ./publish

      - name: Sync local catalog into production database (manual opt-in only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sync_database == 'true' }}
        run: cp src/Web/Grand.Web/App_Data/beh-marketplace-dev.db ./publish/App_Data/beh-marketplace.db

      - name: Strip local/dev-only files from publish output
        run: |
          rm -f ./publish/App_Data/beh-marketplace-dev.db
          rm -f ./publish/App_Data/Settings.cfg
          rm -f ./publish/App_Data/appsettings.Production.json
          rm -rf ./publish/App_Data/DataProtectionKeys

      - name: Upload build to .staging via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./marketplace-grandnode/publish/
          server-dir: ./tienda.behformas.com/.staging/
          state-name: .ftp-deploy-sync-state-store.json
          dangerous-clean-slate: false

      - name: Swap .staging into place and restart (deploy-store.sh via SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STORE_SSH_HOST }}
          username: ${{ secrets.STORE_SSH_USERNAME }}
          password: ${{ secrets.STORE_SSH_PASSWORD }}
          script: /home/behforma/tienda.behformas.com/deploy-store.sh

      - name: Verify the store responds after restart
        run: |
          sleep 10
          curl --fail --max-time 20 -o /dev/null -s -w "tienda.behformas.com -> HTTP %{http_code}\n" https://tienda.behformas.com/
